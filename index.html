<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Our Memories</title>
<link rel="stylesheet" href="css/styles.css">
</head>
<body>

<!-- PASSWORD MODAL -->
<div id="passwordModal" class="modal">
  <div class="modal-content">
    <h3>Enter Password to Access Gallery</h3>
    <input type="password" id="passwordInput" placeholder="Enter password">
    <button onclick="checkPassword()">Enter</button>
  </div>
</div>

<!-- GALLERY APP -->
<div class="app" id="galleryApp" style="display:none;">
  <header>
    ❤️ Our Gallery
    <button class="theme-toggle" onclick="toggleTheme()">🌙</button>
  </header>

  <section class="gallery-section">
    <h2>Our Pictures</h2>
    <div class="photos"></div>
    <button id="addPhotoBtn">Add Photo</button>
  </section>
</div>

<!-- ADD PHOTO MODAL -->
<div class="modal" id="photoModal">
  <div class="modal-content">
    <span class="close" onclick="closeModal()">&times;</span>
    <h3>Add a Photo</h3>
    <input type="text" id="photoTitle" placeholder="Title of Photo">
    <input type="text" id="photoURL" placeholder="Image URL">
    <button onclick="savePhoto()">Save Photo</button>
  </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
